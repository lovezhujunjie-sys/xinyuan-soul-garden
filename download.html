<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>下载 · 心园身心灵</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:#f5f3ff;text-align:center;padding:24px;
    background:linear-gradient(160deg,#1a1f3a,#2d2a52 55%,#3d3268)}
  h1{font-size:26px;letter-spacing:6px;font-weight:600}
  p{color:#b9b4d6;font-size:14px;line-height:1.7;max-width:340px}
  .btn{margin-top:8px;border:none;cursor:pointer;border-radius:999px;padding:18px 40px;font-size:18px;font-weight:600;color:#fff;
    background:linear-gradient(135deg,#a78bfa,#7c5cff);box-shadow:0 10px 30px rgba(124,92,255,.45);transition:.2s;font-family:inherit}
  .btn:hover{transform:translateY(-2px)}
  .btn:active{transform:translateY(0)}
  .open{color:#7dd3c0;font-size:14px;text-decoration:none;margin-top:6px}
  .hint{font-size:12px;color:#8f8ab0;margin-top:10px}
</style>
</head>
<body>
  <h1>心 园</h1>
  <p>点击下方按钮，把这个身心灵应用下载到你的设备<br>下载后双击 <b>心园-身心灵.html</b> 即可离线使用</p>
  <button class="btn" id="dl">⬇ 下载 心园.html</button>
  <a class="open" href="./index.html">或 直接在线打开使用 →</a>
  <div class="hint" id="hint"></div>
<script>
document.getElementById('dl').onclick=function(){
  var h=document.getElementById('hint');h.textContent='正在准备…';
  fetch('./index.html').then(function(r){return r.text()}).then(function(html){
    var blob=new Blob([html],{type:'text/html;charset=utf-8'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='心园-身心灵.html';
    document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(a.href)},1000);
    h.textContent='✅ 已开始下载，去「下载」文件夹找 心园-身心灵.html';
  }).catch(function(){h.textContent='下载失败，请改用浏览器菜单「保存网页」'});
};
</script>
</body>
</html>
